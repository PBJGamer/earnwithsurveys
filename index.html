<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Survey Earnings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #020617;
  color: white;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px 60px;
}

/* BADGE */
.badge {
  display: inline-block;
  background: rgba(34,197,94,0.1);
  color: #22c55e;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 13px;
  margin-bottom: 20px;

  opacity: 0;
  animation: fadeUp 0.6s ease forwards;
}

/* HEADLINE */
h1 {
  font-size: 56px;
  margin: 0;
  line-height: 1.1;
}

/* TEXT REVEAL */
.reveal {
  display: inline-block;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 0.6s ease forwards;
}

.reveal.delay1 { animation-delay: 0.2s; }
.reveal.delay2 { animation-delay: 0.5s; }

.highlight {
  color: #facc15;
}

/* SUBTEXT */
.subtext {
  color: #94a3b8;
  font-size: 18px;
  margin: 15px auto 30px;
  max-width: 500px;

  opacity: 0;
  animation: fadeUp 0.6s ease forwards;
  animation-delay: 0.8s;
}

/* CTA */
.cta-button {
  display: inline-block;
  background: linear-gradient(135deg, #fde047, #facc15);
  color: black;
  padding: 16px 32px;
  border-radius: 12px;
  font-weight: 700;
  text-decoration: none;
  font-size: 18px;
  transition: all 0.25s ease;
  box-shadow: 0 10px 30px rgba(250,204,21,0.3);

  opacity: 0;
  animation: fadeUp 0.6s ease forwards, pulse 2.5s infinite;
  animation-delay: 1.2s;
}

.cta-button:hover {
  transform: translateY(-2px);
}

/* Pulse */
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(250,204,21,0.4); }
  70% { box-shadow: 0 0 0 12px rgba(250,204,21,0); }
  100% { box-shadow: 0 0 0 0 rgba(250,204,21,0); }
}

/* Fade Animation */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* PAYOUT STRIP */
.payouts {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 25px;

  opacity: 0;
  animation: fadeUp 0.6s ease forwards;
  animation-delay: 1.5s;
}

.payout-item {
  background: rgba(255,255,255,0.05);
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  color: #cbd5f5;
  border: 1px solid rgba(255,255,255,0.06);
}

/* MICRO TRUST */
.micro-trust {
  font-size: 12px;
  color: #64748b;
  margin-top: 10px;

  opacity: 0;
  animation: fadeUp 0.6s ease forwards;
  animation-delay: 1.7s;
}

/* SECOND CTA */
.cta-secondary {
  display: inline-block;
  background: transparent;
  border: 2px solid #facc15;
  color: #facc15;
  padding: 14px 30px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.25s ease;
}

.cta-secondary:hover {
  background: #facc15;
  color: black;
}

/* MAIN */
.main {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 60px;
  padding: 40px 20px 100px;
  flex-wrap: wrap;
}

.info {
  max-width: 420px;
  width: 100%;
}

.info h2 {
  margin-bottom: 8px;
}

.info p {
  color: #94a3b8;
  line-height: 1.6;
  margin-bottom: 20px;
}

/* MOCKUP */
.mockup {
  width: 100%;
  max-width: 420px;
  background: #0f172a;
  border-radius: 18px;
  padding: 20px;
}

.mock-top {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.stat {
  flex: 1;
  background: #020617;
  padding: 10px;
  border-radius: 8px;
}

.survey {
  background: #020617;
  padding: 10px;
  border-radius: 6px;
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
}

/* TRUST */
.trust {
  text-align: center;
  font-size: 13px;
  color: #64748b;
  padding: 50px 20px 70px;
}

/* MOBILE */
@media (max-width: 768px) {
  h1 { font-size: 34px; }

  .subtext { font-size: 16px; }

  .main {
    flex-direction: column;
    gap: 30px;
    padding: 30px 16px 80px;
  }

  .cta-button,
  .cta-secondary {
    width: 100%;
    text-align: center;
  }
}
</style>
</head>

<body>

<div class="hero">

  <div class="badge">Free • No experience needed</div>

  <h1>
    <span class="reveal delay1">Get Paid For</span><br>
    <span class="reveal delay2 highlight">Simple Surveys</span>
  </h1>

  <div class="subtext">
    A straightforward way to earn a bit of extra money in your spare time.
  </div>

  <a class="cta-button" href="https://primeopinion.com.au/register?ref=9b1035f1-7d09-4d5e-954b-849d59dbea6d" target="_blank">
    Start Earning
  </a>

  <div style="font-size:13px; color:#64748b; margin-top:10px;">
    Takes less than 1 minute to get started
  </div>

  <div class="payouts">
    <div class="payout-item">💸 PayPal</div>
    <div class="payout-item">🏦 Bank Transfer</div>
    <div class="payout-item">🎁 Gift Cards</div>
    <div class="payout-item">💳 Prepaid Cards</div>
  </div>

  <div class="micro-trust">
    Multiple payout options available worldwide
  </div>

</div>

<!-- rest stays same -->

</body>
</html>
