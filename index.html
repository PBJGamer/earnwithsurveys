<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Paid For Surveys</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a1f4d, #05060f);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

/* Main Card */
.container {
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(12px);
  padding: 50px 30px;
  border-radius: 20px;
  width: 100%;
  max-width: 520px;
  text-align: center;
  box-shadow: 0 0 60px rgba(0,0,0,0.7);
  border: 1px solid rgba(255,255,255,0.08);
}

/* Badge */
.badge {
  display: inline-block;
  background: linear-gradient(45deg, #00c853, #00e676);
  color: black;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 18px;
}

/* Headline */
h1 {
  font-size: 36px;
  color: #FFD700;
  margin-bottom: 12px;
  line-height: 1.2;
}

/* Subtext */
p {
  font-size: 17px;
  color: #d0d0d0;
  margin-bottom: 30px;
}

/* Benefits */
.benefits {
  text-align: left;
  margin: 25px 0 35px 0;
  font-size: 16px;
  line-height: 2;
}

/* CTA Button */
.cta-button {
  display: inline-block;
  background: linear-gradient(45deg, #FFD700, #ffb300);
  color: black;
  font-size: 20px;
  padding: 18px 35px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 700;
  transition: all 0.25s ease;
  box-shadow: 0 8px 30px rgba(255, 200, 0, 0.5);
}

/* Hover */
.cta-button:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 12px 40px rgba(255, 200, 0, 0.8);
}

/* Click */
.cta-button:active {
  transform: scale(0.97);
}

/* Trust */
.trust {
  margin-top: 25px;
  font-size: 14px;
  color: #9aa0b5;
}

/* Mobile tweaks */
@media (max-width: 480px) {
  .container {
    padding: 40px 20px;
  }

  h1 {
    font-size: 30px;
  }

  p {
    font-size: 16px;
  }

  .cta-button {
    width: 100%;
    padding: 18px;
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="badge">✔ 100% Free • No Experience Needed</div>

  <h1>💰 Get Paid For Answering Surveys</h1>
  
  <p>Make extra money in your spare time — simple, quick, and beginner-friendly.</p>

  <div class="benefits">
    ✔ Free to join<br>
    ✔ No skills required<br>
    ✔ Works worldwide<br>
    ✔ Fast & easy payouts
  </div>

  <a class="cta-button" href="https://primeopinion.com.au/register?ref=9b1035f1-7d09-4d5e-954b-849d59dbea6d" target="_blank">
    👉 Start Earning Now
  </a>

  <div class="trust">
    Join thousands of users already earning online
  </div>

</div>

</body>
</html>
